<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      text { font-family: monospace; }

      /* Phase boxes */
      @keyframes fadein0 { 0%,100%{opacity:1} 50%{opacity:0.7} }
      @keyframes fadein1 { 0%{opacity:0.4} 25%{opacity:1} 75%{opacity:1} 100%{opacity:0.4} }
      @keyframes fadein2 { 0%{opacity:0.4} 50%{opacity:1} 100%{opacity:0.4} }
      @keyframes fadein3 { 0%{opacity:0.4} 75%{opacity:1} 100%{opacity:0.4} }

      /* Replica bars */
      @keyframes bar-grow1 {
        0%,20%   { height: 20px; y: 190px; }
        30%,70%  { height: 80px; y: 130px; }
        80%,100% { height: 20px; y: 190px; }
      }
      @keyframes bar-grow2 {
        0%,40%   { height: 20px; y: 190px; }
        50%,70%  { height: 120px; y: 90px; }
        80%,100% { height: 20px; y: 190px; }
      }

      /* DT trigger light */
      @keyframes dt-light {
        0%,25%  { fill: #3a2a2a; }
        30%,75% { fill: #b4a0e5; filter: drop-shadow(0 0 8px #b4a0e5); }
        80%,100%{ fill: #3a2a2a; }
      }
      /* AMP trigger light */
      @keyframes amp-light {
        0%,45%  { fill: #2a2a1a; }
        50%,75% { fill: #ff9900; filter: drop-shadow(0 0 8px #ff9900); }
        80%,100%{ fill: #2a2a1a; }
      }

      /* Connection count ticker */
      @keyframes conn-rise {
        0%,15%  { opacity: 0; }
        20%     { opacity: 1; }
        75%     { opacity: 1; }
        80%,100%{ opacity: 0; }
      }

      /* Packets flying across timeline */
      .pkt-fly-dt {
        fill: #b4a0e5;
        offset-path: path("M 180 80 L 450 80");
        offset-rotate: 0deg;
        animation: fly 8s linear infinite;
      }
      .pkt-fly-amp {
        fill: #ff9900;
        offset-path: path("M 180 100 L 630 100");
        offset-rotate: 0deg;
        animation: fly 8s linear infinite 2s;
      }
      @keyframes fly {
        0%   { opacity: 0; offset-distance: 0%; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { opacity: 0; offset-distance: 100%; }
      }

      .phase0 { animation: fadein0 8s ease-in-out infinite; }
      .phase1 { animation: fadein1 8s ease-in-out infinite; }
      .phase2 { animation: fadein2 8s ease-in-out infinite; }
      .phase3 { animation: fadein3 8s ease-in-out infinite; }

      .dt-indicator  { animation: dt-light  8s ease-in-out infinite; }
      .amp-indicator { animation: amp-light 8s ease-in-out infinite; }

      .replica-bar-dt  { animation: bar-grow1 8s ease-in-out infinite; fill: #4a9eff; rx: 3; }
      .replica-bar-amp { animation: bar-grow2 8s ease-in-out infinite; fill: #e040fb; rx: 3; }

      .conn-label { animation: conn-rise 8s ease-in-out infinite; fill: #e6edf3; font-size: 11px; text-anchor: middle; }
    </style>
  </defs>

  <rect width="900" height="280" class="bg"/>

  <!-- Title -->
  <text x="450" y="28" font-size="15" fill="#e6edf3" text-anchor="middle" font-weight="bold">⚡ Demo Phases — nginx Replica Scaling</text>

  <!-- Timeline bar -->
  <rect x="60" y="55" width="780" height="4" rx="2" fill="#21262d"/>

  <!-- Phase markers -->
  <!-- Phase 0 -->
  <rect x="60" y="48" width="4" height="18" fill="#555"/>
  <text x="62" y="44" font-size="10" fill="#8b949e">0</text>
  <!-- Phase 1 -->
  <rect x="255" y="48" width="4" height="18" fill="#555"/>
  <text x="257" y="44" font-size="10" fill="#8b949e">+30s</text>
  <!-- Phase 2 -->
  <rect x="450" y="48" width="4" height="18" fill="#555"/>
  <text x="452" y="44" font-size="10" fill="#8b949e">+75s</text>
  <!-- Phase 3 -->
  <rect x="645" y="48" width="4" height="18" fill="#555"/>
  <text x="647" y="44" font-size="10" fill="#8b949e">+120s</text>
  <!-- End -->
  <rect x="840" y="48" width="4" height="18" fill="#555"/>
  <text x="842" y="44" font-size="10" fill="#8b949e">+180s</text>

  <!-- Phase labels -->
  <text x="157" y="72" font-size="10" fill="#8b949e" text-anchor="middle" class="phase0">BASELINE</text>
  <text x="352" y="72" font-size="10" fill="#b4a0e5" text-anchor="middle" class="phase1">5 LOAD PODS</text>
  <text x="547" y="72" font-size="10" fill="#ff9900" text-anchor="middle" class="phase2">10 LOAD PODS</text>
  <text x="742" y="72" font-size="10" fill="#4a9eff" text-anchor="middle" class="phase3">COOLDOWN</text>

  <!-- DT indicator -->
  <rect x="60" y="90" width="780" height="22" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="70" y="106" font-size="10" fill="#8b949e">DT trigger</text>
  <rect x="258" y="93" width="387" height="16" rx="3" class="dt-indicator"/>
  <text x="452" y="106" font-size="10" fill="#0d1117" text-anchor="middle" font-weight="bold">isActive: true  (metric &gt; 7)</text>

  <!-- AMP indicator -->
  <rect x="60" y="118" width="780" height="22" rx="4" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="70" y="134" font-size="10" fill="#8b949e">AMP trigger</text>
  <rect x="453" y="121" width="192" height="16" rx="3" class="amp-indicator"/>
  <text x="549" y="134" font-size="10" fill="#0d1117" text-anchor="middle" font-weight="bold">isActive: true  (metric &gt; 10)</text>

  <!-- Replica chart background -->
  <rect x="60" y="155" width="780" height="80" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="70" y="171" font-size="10" fill="#8b949e">nginx replicas</text>
  <text x="70" y="227" font-size="9" fill="#555">1</text>
  <text x="70" y="188" font-size="9" fill="#555">5</text>
  <text x="70" y="165" font-size="9" fill="#555">10</text>

  <!-- Gridlines -->
  <line x1="88" y1="223" x2="840" y2="223" stroke="#21262d" stroke-width="1"/>
  <line x1="88" y1="183" x2="840" y2="183" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="88" y1="163" x2="840" y2="163" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Animated replica bars -->
  <rect x="120" width="260" height="20" y="190" class="replica-bar-dt" opacity="0.85"/>
  <rect x="400" width="200" height="20" y="190" class="replica-bar-amp" opacity="0.85"/>

  <!-- Baseline replica line -->
  <line x1="88" y1="210" x2="840" y2="210" stroke="#00c44f" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="845" y="213" font-size="9" fill="#00c44f">min=1</text>

  <!-- Connection count annotations -->
  <text x="352" y="150" class="conn-label" opacity="0">~100 conns (5 pods)</text>
  <text x="547" y="150" class="conn-label" style="animation-delay:2s" opacity="0">~200 conns (10 pods)</text>

  <!-- Flying packets -->
  <circle r="4" class="pkt-fly-dt"/>
  <circle r="4" class="pkt-fly-amp"/>

  <!-- Bottom labels -->
  <text x="450" y="255" font-size="10" fill="#555" text-anchor="middle">
    cooldownPeriod=60s  ·  stabilizationWindowSeconds=60s  ·  pollingInterval=15s
  </text>
  <text x="450" y="270" font-size="10" fill="#555" text-anchor="middle">
    DT threshold=10  ·  DT activationThreshold=7  ·  AMP threshold=20  ·  AMP activationThreshold=10
  </text>
</svg>
